name: Update CNIP Ranges

on:
  schedule:
    - cron: "0 * * * *"   
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cnip-update
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo (cnip)
        uses: actions/checkout@v4
        with:
          repository: url8/cnip
          ref: main
          token: ${{ secrets.TOKEN_GITHUB_PAT }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run merge script
        run: python scripts/merge_ips.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "update cn ip ranges [auto]"

      - name: Push to main
        env:
          TOKEN: ${{ secrets.TOKEN_GITHUB_PAT }}
        run: |
          git push https://x-access-token:${TOKEN}@github.com/url8/cnip.git main
